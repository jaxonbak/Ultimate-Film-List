    if (state.seen[title]) delete state.seen[title]; else state.seen[title] = true;
    save("seen", state.seen); render();
  } else if (action === "fav") {
    e.stopPropagation();
    if (state.favorites[title]) delete state.favorites[title]; else state.favorites[title] = true;
    save("favorites", state.favorites); render();
  } else if (action === "pri") {
    e.stopPropagation();
    if (state.priority[title]) delete state.priority[title]; else state.priority[title] = true;
    save("priority", state.priority); render();
  } else if (action === "toggle-section") {
    const id = el.dataset.sectionId;
    state.expanded[id] = state.expanded[id] === false ? undefined : false;
    if (state.expanded[id] === undefined) delete state.expanded[id];
    render();
  } else if (action === "filter") {
    state.filter = el.dataset.filter;
    render();
  }
});

document.addEventListener("input", function(e) {
  if (e.target.dataset.noteFor) {
    const title = e.target.dataset.noteFor;
    state.notes[title] = e.target.value;
    if (!state.notes[title]) delete state.notes[title];
    save("notes", state.notes);
  }
});

function matchSearch(m) {
  if (!state.search) return true;
  const s = state.search.toLowerCase();
  return m.title.toLowerCase().includes(s) ||
    m.genre.toLowerCase().includes(s) ||
    m.year.includes(s) ||
    (m.label && m.label.toLowerCase().includes(s)) ||
    m.tags.some(t => t.toLowerCase().includes(s));
}

function getFiltered() {
  const all = SECTIONS.flatMap(s => s.movies);
  if (state.search) {
    return SECTIONS.map(s => ({...s, movies: s.movies.filter(matchSearch)})).filter(s => s.movies.length);
  }
  if (state.filter === 'favorites') {
    const movies = all.filter(m => state.favorites[m.title]);
    return movies.length ? [{id:'favorites',title:'Personal Favorites',intro:'Your all-time favorites.',movies}] : [];
  }
  if (state.filter === 'priority') {
    const movies = all.filter(m => state.priority[m.title]);
    return movies.length ? [{id:'priority',title:'Priority Watch List',intro:'Films to watch next.',movies}] : [];
  }
  // Build favorites section at top
  const favMovies = all.filter(m => state.favorites[m.title]);
  const favSection = favMovies.length ? [{id:'favorites-top',title:'Personal Favorites',intro:'Your all-time favorites.',movies:favMovies}] : [];
  const genreSections = SECTIONS.map(s => ({...s,
    movies: s.movies.filter(m => {
      const mf = state.filter==='all'||(state.filter==='seen'?!!state.seen[m.title]:!state.seen[m.title]);
      const ms = state.activeSection==='all'||s.id===state.activeSection;
      return mf && ms;
    })
  })).filter(s => s.movies.length);
  return favSection.concat(genreSections);
}

function e(s) { const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

function renderMovie(m) {
  const isSeen = !!state.seen[m.title];
  const isFav = !!state.favorites[m.title];
  const isPri = !!state.priority[m.title];
  const ls = LS[m.label]||{};
  const oscars = m.oscars ? [`\ud83c\udfc6 ${m.oscars} Oscar${m.oscars>1?'s':''}`] : [];
  const tags = oscars.concat(m.tags.filter(t=>t!=="Oscar Winner"));
  const trailerUrl = "https://www.youtube.com/results?search_query="+encodeURIComponent(m.title+" "+m.year+" official trailer");
  const titleEsc = e(m.title);
  const titleAttr = m.title.replace(/"/g, "&quot;");

  let labelHtml = "";
  if (m.label && ls.bg) {
    labelHtml = `<span class="label-tag" style="background:${ls.bg};color:${ls.text};border:1px solid ${ls.border}">${e(m.label)}</span>`;
  }
  const tagsHtml = tags.map(t => `<span class="tag">${e(t)}</span>`).join("");

  return `<div style="display:flex;flex-direction:column;gap:0">
    <div class="movie-row" style="background:${isSeen?'#0a1628':'#111827'};border:1px solid ${isSeen?'#1d4ed8':'#1f2937'};border-radius:${(state.filter==='favorites'||state._currentSec==='favorites-top')?'8px 8px 0 0':'8px'};opacity:${isSeen?0.8:1};box-shadow:${isSeen?'inset 0 0 20px rgba(29,78,216,0.08)':'none'}">
    <div data-action="seen" data-title="${titleAttr}" style="width:20px;height:20px;border-radius:4px;flex-shrink:0;background:${isSeen?'#2563eb':'#0f0f0f'};border:2px solid ${isSeen?'#3b82f6':'#374151'};display:flex;align-items:center;justify-content:center;box-shadow:${isSeen?'0 0 8px rgba(59,130,246,0.5)':'none'};cursor:pointer">${isSeen?'<span style="color:#fff;font-size:11px;font-weight:bold">\u2713</span>':''}</div>
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">
        <span style="font-size:14px;font-weight:600;color:${isSeen?'#7d8694':'#f1f5f9'};text-decoration:${isSeen?'line-through':'none'};text-decoration-color:#3b82f6">${titleEsc}</span>
        <span style="color:#374151;font-size:12px">${m.year}</span>
        <span style="color:#4b5563;font-size:12px;font-style:italic">${e(m.genre)}</span>
      </div>
      <div style="display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;align-items:center">${labelHtml}${tagsHtml}</div>
    </div>
    <div style="display:flex;gap:6px;flex-shrink:0;align-items:center">
      <a href="${trailerUrl}" target="_blank" rel="noopener noreferrer" class="btn-icon" style="font-size:13px;opacity:0.5;text-decoration:none" title="Watch trailer">\u25b6\ufe0f</a>
      <div data-action="pri" data-title="${titleAttr}" class="btn-icon" style="font-size:15px;opacity:${isPri?1:0.5};filter:${isPri?'drop-shadow(0 0 4px rgba(52,211,153,0.6))':'none'}">\u23f3</div>
      <div data-action="fav" data-title="${titleAttr}" class="btn-icon" style="font-size:18px;opacity:${isFav?1:0.3};filter:${isFav?'drop-shadow(0 0 4px rgba(251,191,36,0.6))':'grayscale(1)'}">\u2b50</div>
    </div>
  </div>${state.filter==='favorites'?`<textarea data-note-for="${titleAttr}" placeholder="Why is this a favorite?" style="width:100%;background:#0a1628;border:1px solid #1d4ed8;border-top:none;border-radius:0 0 8px 8px;color:#9ca3af;padding:8px 12px;font-size:12px;font-family:inherit;resize:vertical;min-height:36px;outline:none">${e(state.notes[m.title]||'')}</textarea>`:''}
  </div>`;
}

function render() {
  const total = SECTIONS.reduce((s,sec) => s+sec.movies.length, 0);
  const seenCount = Object.keys(state.seen).length;
  const pct = Math.round((seenCount/total)*100);
  const filtered = getFiltered();
  const disSel = state.filter==="favorites"||state.filter==="priority";

  const filterBtns = ["all","unseen","seen","favorites","priority"].map(f => {
    const lbl = {all:"All Films",unseen:"To Watch",seen:"Watched",favorites:"\u2b50 Favorites",priority:"\u23f3 Priority"}[f];
    return `<button data-action="filter" data-filter="${f}" class="filter-btn ${state.filter===f?'active':''}">${lbl}</button>`;
  }).join("");

  const opts = SECTIONS.map(s => `<option value="${s.id}" ${state.activeSection===s.id?'selected':''}>${e(s.title)}</option>`).join("");

  let body = "";
  if (!filtered.length) {
    body = `<div style="text-align:center;padding:60px;color:#374151">No films match.</div>`;
  } else {
    filtered.forEach(sec => { state._currentSec = sec.id;
      const secSeen = sec.movies.filter(m => !!state.seen[m.title]).length;
      const collapsed = state.expanded[sec.id] === false;
      const moviesHtml = collapsed ? "" : `<div style="display:flex;flex-direction:column;gap:5px">${sec.movies.map(renderMovie).join("")}</div>`;

      body += `<div style="margin-bottom:24px">
        <button class="section-btn" data-action="toggle-section" data-section-id="${sec.id}">
          <div style="text-align:left">
            <div style="font-size:15px;font-weight:700;color:#60a5fa;letter-spacing:1px;text-transform:uppercase">${e(sec.title)}</div>
            <div style="font-size:12px;color:#4b5563;margin-top:2px">${e(sec.intro)}</div>
          </div>
          <div style="display:flex;align-items:center;gap:12px;flex-shrink:0">
            <span style="font-size:12px;color:${secSeen===sec.movies.length?'#3b82f6':'#4b5563'};background:#111827;padding:3px 10px;border-radius:999px;border:1px solid #1f2937">${secSeen}/${sec.movies.length}</span>
            <span style="color:#3b82f6;font-size:13px">${collapsed?'\u25b6':'\u25bc'}</span>
          </div>
        </button>
        ${moviesHtml}
      </div>`;
    });
  }

  const scrollY = window.scrollY;
  const searchEl = document.getElementById("searchInput");
  const cursorPos = searchEl ? searchEl.selectionStart : null;

  document.getElementById("app").innerHTML = `
    <div style="background:linear-gradient(135deg,#111827,#0f0f0f);border-bottom:2px solid #2563eb;padding:32px 24px 24px">
      <div style="max-width:900px;margin:0 auto">
        <h1 style="font-size:26px;font-weight:700;color:#f8fafc;letter-spacing:3px;text-transform:uppercase">The Ultimate Film List</h1>
        <p style="color:#4b5563;margin-top:6px;font-size:13px">${total} films across ${NUM_SECTIONS} sections</p>
        <div style="margin-top:20px">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px">
            <span style="font-size:13px;color:#9ca3af"><strong style="color:#60a5fa">${seenCount}</strong> of ${total} watched</span>
            <span style="font-size:13px;color:#3b82f6;font-weight:bold">${pct}%</span>
          </div>
          <div style="background:#1f2937;border-radius:999px;height:8px;overflow:hidden">
            <div style="height:100%;border-radius:999px;background:linear-gradient(90deg,#1d4ed8,#3b82f6,#60a5fa);width:${pct}%;transition:width 0.4s ease"></div>
          </div>
        </div>
      </div>
    </div>
    <div style="background:#111827;border-bottom:1px solid #1f2937;padding:14px 24px;position:sticky;top:0;z-index:50">
      <div style="max-width:900px;margin:0 auto;display:flex;gap:12px;flex-wrap:wrap;align-items:center">
        <input id="searchInput" value="${e(state.search)}" placeholder="Search films, tags, genres..." style="background:#0f0f0f;border:1px solid #374151;border-radius:8px;color:#e2e8f0;padding:7px 12px;font-size:13px;flex:1 1 160px;outline:none">
        ${filterBtns}
        <select id="sectionSelect" style="background:#0f0f0f;border:1px solid #374151;border-radius:8px;color:#e2e8f0;padding:7px 12px;font-size:12px;cursor:pointer;outline:none;opacity:${disSel?0.4:1}" ${disSel?'disabled':''}>
          <option value="all" ${state.activeSection==='all'?'selected':''}>All Sections</option>
          ${opts}
        </select>
      </div>
    </div>
    <div style="max-width:900px;margin:0 auto;padding:24px 16px 60px">${body}</div>`;

  window.scrollTo(0, scrollY);
  const newSearch = document.getElementById("searchInput");
  newSearch.addEventListener("input", function() { state.search = this.value; render(); });
  if (state.search && cursorPos !== null) {
    newSearch.focus();
    newSearch.setSelectionRange(cursorPos, cursorPos);
  }
  document.getElementById("sectionSelect").addEventListener("change", function() {
    state.activeSection = this.value; render();
  });
}

load();
</script>
</body>
</html>
